    >

          <!-- ═══ Section Header ═══ -->
    <div class="mgr-header wow fadeInUp" data-wow-delay="00ms" data-wow-duration="1200ms">
      <span class="mgr-header__eyebrow">
        <span class="mgr-header__line"></span>
                        {{ "OurProducts" | translate }}


        <span class="mgr-header__line"></span>
      </span>
    </div>

      </div>

   
    </div>
  </div>

  <div class="container">
    <div class="case-grid row g-4">
      <div
        class="col-xl-3 col-lg-4 col-md-6 col-sm-6"
        *ngFor="let project of projects; trackBy: trackByProjectId"
      >
        <article
          class="case-card wow fadeInUp"
          data-wow-delay="100ms"
          data-wow-duration="1500ms"
          [attr.data-category]="project.categoryType"
        >
          <!-- Badge -->
          <div class="case-card__badge" [ngClass]="'badge--' + project.categoryType">
            <i class="fa-regular" [ngClass]="project.categoryIcon"></i>
            {{ project.category | translate }}
          </div>

          <div class="case-card__image">
            <img
              [src]="project.mainImage"
              [alt]="project.title | translate"
              loading="lazy"
            />

            <!-- Scent/product notes pills -->
            <div class="case-card__notes" *ngIf="project.notes?.length">
              <span
                class="note-pill"
                *ngFor="let note of project.notes"
              >{{ note }}</span>
            </div>

            <a
              [routerLink]="['/case', project.id]"
              class="case-card__overlay"
              aria-label="View project"
            >
              <span>{{ "Explore" | translate }}</span>
              <i class="fa-regular" [ngClass]="{
                  'fa-arrow-right': !isRTL,
                  'fa-arrow-left': isRTL
                }"></i>
            </a>
          </div>

          <div class="case-card__body">
            <h5 class="case-card__title">
              <a [routerLink]="['/case', project.id]">
                {{ project.title | translate }}
              </a>
            </h5>

            <p class="case-card__desc">{{ project.briefDescription | translate }}</p>

            <div class="case-card__footer">
              <span class="case-card__price" *ngIf="project.price">
                {{ project.price }}
              </span>
              <a [routerLink]="['/case', project.id]" class="case-card__cta">
                <i class="fa-regular fa-eye"></i>
              </a>
            </div>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
